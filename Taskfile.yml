# https://taskfile.dev

version: "3"

vars:
  PYTHON: python3

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list
    silent: true

  # Development tasks
  install:
    desc: Install development dependencies
    cmds:
      - uv sync --all-extras

  test:
    desc: Run tests
    cmds:
      - uv run pytest
      - go test ./...

  test-coverage:
    desc: Run tests with coverage report
    cmds:
      - uv run pytest --cov=lofigui --cov-report=html --cov-report=xml --cov-report=term-missing

  lint:
    desc: Run all linters
    cmds:
      - task: lint-black
      - task: lint-flake8
      # - task: lint-mypy

  lint-black:
    desc: Check code formatting with black
    cmds:
      - .venv/bin/black --check lofigui tests

  lint-flake8:
    desc: Run flake8 linter
    cmds:
      - .venv/bin/flake8 lofigui tests --max-line-length=100 --extend-ignore=E203,W503,F401

  lint-mypy:
    desc: Run mypy type checker
    cmds:
      - .venv/bin/mypy lofigui

  format:
    desc: Format code with black
    cmds:
      - .venv/bin/black lofigui tests

  fmt:
    desc: Format all code (Go + Python)
    cmds:
      - gofmt -w .
      - task: format

  vet:
    desc: Run Go vet
    cmds:
      - go vet ./...

  check:
    desc: Run fmt, vet, and test
    cmds:
      - task: fmt
      - task: vet
      - task: test

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf dist/ *.egg-info __pycache__ .pytest_cache .mypy_cache .coverage htmlcov
      - find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
      - rm -f examples/03_style_sampler/go/main.wasm 2>/dev/null || true

  clean-ports:
    desc: Kill processes on demo server ports (1340-1349)
    cmds:
      - |
        for port in $(seq 1340 1349); do
          pid=$(lsof -ti :$port 2>/dev/null) || true
          if [ -n "$pid" ]; then
            echo "Killing PID $pid on port $port"
            kill $pid 2>/dev/null || true
          fi
        done
        echo "Demo ports 1340-1349 cleared"

  check-licenses:
    desc: Check Go dependencies for license compliance
    cmds:
      - go install github.com/google/go-licenses@latest
      - go-licenses check ./... --allowed_licenses MIT,Apache-2.0,BSD-2-Clause,BSD-3-Clause,ISC,MPL-2.0

  build:
    desc: Build package distribution
    cmds:
      - uv build

  # Python example tasks
  example-01:
    desc: Run Python example 01 (Hello World with FastAPI)
    aliases: [py01]
    dir: examples/01_hello_world/python
    cmds:
      - uv sync --no-install-project
      - uv run --no-project python hello.py

  example-02:
    desc: Run Python example 02 (SVG Graph with Pygal)
    aliases: [py02]
    dir: examples/02_svg_graph/python
    cmds:
      - uv sync --no-install-project
      - uv run --no-project python graph.py

  example-05:
    desc: Run Python example 05 (Demo App with template inheritance)
    aliases: [py05, demo]
    dir: examples/05_demo_app
    cmds:
      - uv sync --no-install-project
      - uv run --no-project python demo_app.py

  example-06:
    desc: Run Python example 06 (Notes CRUD)
    aliases: [py06]
    dir: examples/06_notes_crud/python
    cmds:
      - uv sync --no-install-project
      - uv run --no-project python notes.py

  # Go example tasks (wildcard)
  go-example:11:
    desc: 'Water Tank Storage (WASM + API server)'
    dir: examples/11_water_tank_storage/go
    cmds:
      - go mod tidy
      - GOOS=js GOARCH=wasm go build -ldflags="-s" -trimpath -o main.wasm .
      - cp "$(go env GOROOT)/misc/wasm/wasm_exec.js" .
      - go run .

  go-example:*:
    desc: 'Run Go example (use go-wasm:NN for WASM examples)'
    vars:
      NUM: '{{index .MATCH 0}}'
      EXAMPLE_DIR:
        sh: ls -d examples/{{index .MATCH 0}}_*/go 2>/dev/null || echo ""
    preconditions:
      - sh: '[ -n "{{.EXAMPLE_DIR}}" ]'
        msg: 'No Go example found for number {{.NUM}}'
      - sh: '[ ! -f "build.sh" ]'
        msg: 'Example {{.NUM}} is a WASM example — use task go-wasm:{{.NUM}} instead'
    dir: '{{.EXAMPLE_DIR}}'
    cmds:
      - go mod tidy
      - go run .

  go-wasm:11:
    desc: 'Run SeaweedFS WASM demo (starts weed server in background)'
    cmds:
      - mkdir -p temp
      - defer: { task: _weed:stop }
      - |
        weed server -dir=temp -master.port=9333 -volume.port=9334 &
        WEED_PID=$!
        echo $WEED_PID > temp/weed.pid
        echo "Waiting for SeaweedFS master..."
        for i in $(seq 1 30); do
          if curl -sf http://localhost:9333/dir/status >/dev/null 2>&1; then
            echo "SeaweedFS ready"
            break
          fi
          sleep 0.5
        done
        (cd examples/11_seaweedfs/go && chmod +x build.sh && ./build.sh)
        cd examples/11_seaweedfs && python3 serve.py
        kill $WEED_PID 2>/dev/null || true

  go-wasm:*:
    desc: 'Build and serve Go WASM example'
    vars:
      NUM: '{{index .MATCH 0}}'
      EXAMPLE_DIR:
        sh: ls -d examples/{{index .MATCH 0}}_*/go 2>/dev/null || echo ""
    preconditions:
      - sh: '[ -n "{{.EXAMPLE_DIR}}" ]'
        msg: 'No Go example found for number {{.NUM}}'
      - sh: '[ -f "build.sh" ]'
        msg: 'Example {{.NUM}} is not a WASM example — use task go-example:{{.NUM}} instead'
    dir: '{{.EXAMPLE_DIR}}'
    cmds:
      - chmod +x build.sh
      - ./build.sh
      - echo ""
      - echo "Build complete! Starting server..."
      - cd .. && {{.PYTHON}} serve.py

  build-wasm:*:
    desc: 'Build WASM binary only (no serve)'
    vars:
      NUM: '{{index .MATCH 0}}'
      EXAMPLE_DIR:
        sh: ls -d examples/{{index .MATCH 0}}_*/go 2>/dev/null || echo ""
    preconditions:
      - sh: '[ -n "{{.EXAMPLE_DIR}}" ]'
        msg: 'No Go example found for number {{.NUM}}'
      - sh: '[ -f "build.sh" ]'
        msg: 'Example {{.NUM}} is not a WASM example'
    dir: '{{.EXAMPLE_DIR}}'
    cmds:
      - chmod +x build.sh
      - ./build.sh

  docs:capture:01:
    desc: Capture screenshots for example 01 documentation
    dir: examples/01_hello_world/go
    cmds:
      - |
        LOFIGUI_HOLD=1 go run . &
        SERVER_PID=$!
        trap "kill $SERVER_PID 2>/dev/null" EXIT
        for i in $(seq 1 30); do
          curl -sf http://localhost:1340/ > /dev/null 2>&1 && break
          sleep 0.5
        done
        # First curl triggered model — wait for partial progress
        sleep 2
        url2svg --url http://localhost:1340 -o ../../../docs/01_polling.svg
        # Wait for model completion (~5s loop + margin)
        sleep 5
        url2svg --url http://localhost:1340 -o ../../../docs/01_complete.svg

  docs:capture:
    desc: Capture all example screenshots
    cmds:
      - task: docs:capture:01

  docs:open:01:
    desc: Start example 01 in HOLD mode for manual inspection
    dir: examples/01_hello_world/go
    cmds:
      - echo "Server at http://localhost:1340 — Ctrl-C to stop"
      - LOFIGUI_HOLD=1 go run .

  docs:build:
    desc: Build documentation (markdown to HTML)
    cmds:
      - task-plus md2html --file README.md --dst docs
      - task-plus md2html --file CHANGELOG.md --dst docs
      - task-plus md2html --file ROADMAP.md --dst docs
      - task-plus md2html --file RESEARCH.md --dst docs
      - task-plus md2html --file docs/research-philosophy.md --dst docs
      - task-plus md2html --file docs/research-charts.md --dst docs
      - task-plus md2html --file docs/research-layouts.md --dst docs
      - task-plus md2html --file docs/research-technical.md --dst docs
      - task-plus md2html --file docs/research-bugs.md --dst docs
      - task-plus md2html --file docs/research-python.md --dst docs
      - task-plus md2html --file docs/research-wasm-service-workers.md --dst docs
      - task-plus md2html --file docs/research-wasm-external-apis.md --dst docs
      - task-plus md2html --file docs/research-wasm-tinygo.md --dst docs
      - task-plus md2html --file docs/recipes.md --dst docs
      - task-plus md2html --file docs/examples.md --dst docs
      - task-plus md2html --file docs/index.md --dst docs
      # Example documentation pages (from examples/NN_name/docs.md)
      - task-plus md2html --file examples/01_hello_world/index.md --dst docs/01_hello_world
      - task-plus md2html --file examples/01a_hello_world_explicit/index.md --dst docs/01a_hello_world_explicit
      - task-plus md2html --file examples/01b_hello_world_explicit_gzip/index.md --dst docs/01b_hello_world_explicit_gzip
      - task-plus md2html --file examples/02_svg_graph/index.md --dst docs/02_svg_graph
      - task-plus md2html --file examples/03_style_sampler/index.md --dst docs/03_style_sampler
      - task-plus md2html --file examples/05_demo_app/index.md --dst docs/05_demo_app
      - task-plus md2html --file examples/06_notes_crud/index.md --dst docs/06_notes_crud
      - task-plus md2html --file examples/07_water_tank/index.md --dst docs/07_water_tank
      - task-plus md2html --file examples/08_water_tank_multi/index.md --dst docs/08_water_tank_multi
      - task-plus md2html --file examples/09_water_tank_htmx/index.md --dst docs/09_water_tank_htmx
      - task-plus md2html --file examples/10_water_tank_maintenance/index.md --dst docs/10_water_tank_maintenance
      - task-plus md2html --file examples/11_water_tank_storage/index.md --dst docs/11_water_tank_storage
      - task-plus md2html --file examples/12_batch_yield/index.md --dst docs/12_batch_yield
      # Fix breadcrumb/navbar links for nested example pages (md2html generates same-dir links)
      - |
        for f in docs/*/index.html; do
          [ -f "$f" ] || continue
          sed -i 's|href="index.html">lofigui|href="../index.html">lofigui|' "$f"
          sed -i 's|<a href="#" aria-current="page">Internal Docs</a>|<a href="../index.html">Docs</a>|' "$f"
        done
      - d2 docs/01_flow.d2 docs/01_hello_world/01_flow.svg

  post:release:
    desc: Commit docs assets rebuilt during pages deploy
    cmds:
      - git add docs/
      - git diff --cached --quiet || git commit -m "Rebuild docs assets for $(git describe --tags --abbrev=0)"
      - git push origin main
      - git push github main

  docs:build-wasm:
    desc: Build Go WASM examples for docs/ folder (fast, used by tp pages)
    vars:
      WASM_EXEC_JS:
        sh: find $(go env GOROOT) -name wasm_exec.js -print -quit
    cmds:
      # 01 Hello World (compact plain — library CLI generates the SW bootstrap)
      - rm -rf docs/01_hello_world/wasm_demo
      - cd examples/01_hello_world/go && GOOS=js GOARCH=wasm go build -ldflags="-s" -trimpath -o main.wasm .
      - go run ./cmd/wasm-deploy --dir=docs/01_hello_world/wasm_demo --title="01 — Hello World" --wasm=examples/01_hello_world/go/main.wasm --recovery-stubs=demo.html,demo-gz.html
      - rm examples/01_hello_world/go/main.wasm
      # 01a Hello World Explicit (service worker — hand-written templates/sw/)
      - rm -rf docs/01a_hello_world_explicit/wasm_demo
      - mkdir -p docs/01a_hello_world_explicit/wasm_demo/sw
      - cd examples/01a_hello_world_explicit/go && GOOS=js GOARCH=wasm go build -ldflags="-s" -trimpath -o main.wasm .
      - cp examples/01a_hello_world_explicit/go/templates/wasm_demo_index.html docs/01a_hello_world_explicit/wasm_demo/index.html
      - cp examples/01a_hello_world_explicit/go/templates/demo-sw.html docs/01a_hello_world_explicit/wasm_demo/demo-sw.html
      - cp "{{.WASM_EXEC_JS}}" docs/01a_hello_world_explicit/wasm_demo/sw/
      - cp examples/01a_hello_world_explicit/go/main.wasm docs/01a_hello_world_explicit/wasm_demo/sw/
      - cp examples/01a_hello_world_explicit/go/templates/sw/index.html docs/01a_hello_world_explicit/wasm_demo/sw/
      - cp examples/01a_hello_world_explicit/go/templates/sw/sw.js docs/01a_hello_world_explicit/wasm_demo/sw/
      - cp examples/01a_hello_world_explicit/go/templates/sw/wasmhttp_sw.js docs/01a_hello_world_explicit/wasm_demo/sw/
      - rm examples/01a_hello_world_explicit/go/main.wasm
      # 01b Hello World Explicit + gzip (hand-written bootstrap with DecompressionStream)
      - rm -rf docs/01b_hello_world_explicit_gzip/wasm_demo
      - mkdir -p docs/01b_hello_world_explicit_gzip/wasm_demo/sw
      - cd examples/01b_hello_world_explicit_gzip/go && GOOS=js GOARCH=wasm go build -ldflags="-s" -trimpath -o main.wasm .
      - cp examples/01b_hello_world_explicit_gzip/go/templates/wasm_demo_index.html docs/01b_hello_world_explicit_gzip/wasm_demo/index.html
      - cp examples/01b_hello_world_explicit_gzip/go/templates/demo-sw.html docs/01b_hello_world_explicit_gzip/wasm_demo/demo-sw.html
      - cp "{{.WASM_EXEC_JS}}" docs/01b_hello_world_explicit_gzip/wasm_demo/sw/
      - cp examples/01b_hello_world_explicit_gzip/go/main.wasm docs/01b_hello_world_explicit_gzip/wasm_demo/sw/
      - cp examples/01b_hello_world_explicit_gzip/go/templates/sw/index.html docs/01b_hello_world_explicit_gzip/wasm_demo/sw/
      - cp examples/01b_hello_world_explicit_gzip/go/templates/sw/sw.js docs/01b_hello_world_explicit_gzip/wasm_demo/sw/
      - cp examples/01b_hello_world_explicit_gzip/go/templates/sw/wasmhttp_sw.js docs/01b_hello_world_explicit_gzip/wasm_demo/sw/
      - rm examples/01b_hello_world_explicit_gzip/go/main.wasm
      # 02 Output Showcase
      - mkdir -p docs/02_svg_graph
      - cd examples/02_svg_graph/go && GOOS=js GOARCH=wasm go build -ldflags="-s" -trimpath -o main.wasm .
      - cp "{{.WASM_EXEC_JS}}" docs/02_svg_graph/
      - cp examples/02_svg_graph/go/main.wasm docs/02_svg_graph/
      - cp examples/02_svg_graph/go/templates/index.html docs/02_svg_graph/demo.html
      - cp examples/02_svg_graph/go/templates/app.js docs/02_svg_graph/
      - rm examples/02_svg_graph/go/main.wasm
      # 03 Style Sampler (templates embedded via go:embed from go/templates/)
      - mkdir -p docs/03_style_sampler
      - cd examples/03_style_sampler/go && GOOS=js GOARCH=wasm go build -ldflags="-s" -trimpath -o main.wasm .
      - cp "{{.WASM_EXEC_JS}}" docs/03_style_sampler/
      - cp examples/03_style_sampler/go/main.wasm docs/03_style_sampler/
      - cp examples/03_style_sampler/go/templates/index.html docs/03_style_sampler/demo.html
      - cp examples/03_style_sampler/go/templates/app.js docs/03_style_sampler/
      - rm examples/03_style_sampler/go/main.wasm
      # 07 Water Tank
      - mkdir -p docs/07_water_tank
      - cd examples/07_water_tank/go && GOOS=js GOARCH=wasm go build -ldflags="-s" -trimpath -o main.wasm .
      - cp "{{.WASM_EXEC_JS}}" docs/07_water_tank/
      - cp examples/07_water_tank/go/main.wasm docs/07_water_tank/
      - cp examples/07_water_tank/go/templates/index.html docs/07_water_tank/demo.html
      - cp examples/07_water_tank/go/templates/app.js docs/07_water_tank/
      - rm examples/07_water_tank/go/main.wasm
      # 08 Water Tank Multi-Page
      - mkdir -p docs/08_water_tank_multi
      - cd examples/08_water_tank_multi/go && GOOS=js GOARCH=wasm go build -ldflags="-s" -trimpath -o main.wasm .
      - cp "{{.WASM_EXEC_JS}}" docs/08_water_tank_multi/
      - cp examples/08_water_tank_multi/go/main.wasm docs/08_water_tank_multi/
      - cp examples/08_water_tank_multi/go/templates/index.html docs/08_water_tank_multi/demo.html
      - cp examples/08_water_tank_multi/go/templates/app.js docs/08_water_tank_multi/
      - rm examples/08_water_tank_multi/go/main.wasm
      # 09 Water Tank HTMX
      - mkdir -p docs/09_water_tank_htmx
      - cd examples/09_water_tank_htmx/go && GOOS=js GOARCH=wasm go build -ldflags="-s" -trimpath -o main.wasm .
      - cp "{{.WASM_EXEC_JS}}" docs/09_water_tank_htmx/
      - cp examples/09_water_tank_htmx/go/main.wasm docs/09_water_tank_htmx/
      - cp examples/09_water_tank_htmx/go/templates/index.html docs/09_water_tank_htmx/demo.html
      - cp examples/09_water_tank_htmx/go/templates/app.js docs/09_water_tank_htmx/
      - cp examples/09_water_tank_htmx/go/templates/sw.js docs/09_water_tank_htmx/
      - cp examples/09_water_tank_htmx/go/templates/demo-sw.html docs/09_water_tank_htmx/
      - rm examples/09_water_tank_htmx/go/main.wasm
      # 10 Water Tank Maintenance
      - mkdir -p docs/10_water_tank_maintenance
      - cd examples/10_water_tank_maintenance/go && GOOS=js GOARCH=wasm go build -ldflags="-s" -trimpath -o main.wasm .
      - cp "{{.WASM_EXEC_JS}}" docs/10_water_tank_maintenance/
      - cp examples/10_water_tank_maintenance/go/main.wasm docs/10_water_tank_maintenance/
      - cp examples/10_water_tank_maintenance/go/templates/index.html docs/10_water_tank_maintenance/demo.html
      - cp examples/10_water_tank_maintenance/go/templates/app.js docs/10_water_tank_maintenance/
      - rm examples/10_water_tank_maintenance/go/main.wasm
      # 11 Water Tank Storage
      - mkdir -p docs/11_water_tank_storage
      - cd examples/11_water_tank_storage/go && GOOS=js GOARCH=wasm go build -ldflags="-s" -trimpath -o main.wasm .
      - cp "{{.WASM_EXEC_JS}}" docs/11_water_tank_storage/
      - cp examples/11_water_tank_storage/go/main.wasm docs/11_water_tank_storage/
      - cp examples/11_water_tank_storage/go/templates/index.html docs/11_water_tank_storage/demo.html
      - cp examples/11_water_tank_storage/go/templates/app.js docs/11_water_tank_storage/
      - rm examples/11_water_tank_storage/go/main.wasm
      # 12 Batch Yield
      - mkdir -p docs/12_batch_yield
      - cd examples/12_batch_yield/go && GOOS=js GOARCH=wasm go build -ldflags="-s" -trimpath -o main.wasm .
      - cp "{{.WASM_EXEC_JS}}" docs/12_batch_yield/
      - cp examples/12_batch_yield/go/main.wasm docs/12_batch_yield/
      - cp examples/12_batch_yield/go/templates/index.html docs/12_batch_yield/demo.html
      - cp examples/12_batch_yield/go/templates/app.js docs/12_batch_yield/
      - rm examples/12_batch_yield/go/main.wasm
      # Gzip all WASM binaries for hosts that support pre-compressed assets
      - find docs -name "main.wasm" -exec gzip -9 -f -k {} \;


  go-example:11:
    desc: 'Run SeaweedFS demo (starts weed server in background)'
    dir: examples/11_seaweedfs/go
    cmds:
      - mkdir -p ../../../temp
      - defer: { task: _weed:stop }
      - |
        weed server -dir=../../../temp -master.port=9333 -volume.port=9334 &
        WEED_PID=$!
        echo $WEED_PID > ../../../temp/weed.pid
        echo "Waiting for SeaweedFS master..."
        for i in $(seq 1 30); do
          if curl -sf http://localhost:9333/dir/status >/dev/null 2>&1; then
            echo "SeaweedFS ready"
            break
          fi
          sleep 0.5
        done
        go mod tidy && go run .
        kill $WEED_PID 2>/dev/null || true

  _weed:stop:
    desc: 'Stop weed server if pid file exists'
    internal: true
    cmds:
      - |
        if [ -f temp/weed.pid ]; then
          kill $(cat temp/weed.pid) 2>/dev/null || true
          rm -f temp/weed.pid
        fi

  # Go module tidy tasks (wildcard)
  tidy:
    desc: Run go tidy and update for all
    deps: [tidy:main, tidy:01, tidy:01a, tidy:02, tidy:03, tidy:06, tidy:07, tidy:08, tidy:09, tidy:10, tidy:11, tidy:12]

  tidy:main:
    desc: Run go tidy and update main
    cmds:
      - go mod tidy
      - go get -u ./...

  tidy:*:
    desc: 'Run go tidy and update for example'
    vars:
      NUM: '{{index .MATCH 0}}'
      EXAMPLE_DIR:
        sh: ls -d examples/{{index .MATCH 0}}_*/go 2>/dev/null || echo ""
    preconditions:
      - sh: '[ -n "{{.EXAMPLE_DIR}}" ]'
        msg: 'No Go example found for number {{.NUM}}'
    dir: '{{.EXAMPLE_DIR}}'
    cmds:
      - go mod tidy
      - go get -u ./...


