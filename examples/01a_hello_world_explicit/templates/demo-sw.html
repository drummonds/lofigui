<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hello World Explicit — Service Worker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
</head>
<body>
  <section class="section">
    <div class="container">
      <h1 class="title">Hello World Explicit (Service Worker)</h1>
      <h2 class="subtitle">Go net/http handlers running in WASM inside a service worker</h2>
      <div id="status">
        <progress class="progress is-primary" max="100">Loading...</progress>
        <p class="mt-3">Registering service worker and loading WASM binary...</p>
      </div>
    </div>
  </section>
  <script>
    var statusDiv = document.getElementById('status');
    var statusP = statusDiv.querySelector('p');

    if (!('serviceWorker' in navigator)) {
      statusDiv.innerHTML = '<div class="notification is-danger">' +
        'Service workers are not supported in this browser.' +
        '</div>';
    } else {
      navigator.serviceWorker.register('sw.js')
        .then(function(reg) {
          statusP.textContent = 'Service worker registered, loading WASM binary...';
          return navigator.serviceWorker.ready;
        })
        .then(function() {
          statusDiv.innerHTML = '<div class="notification is-success">' +
            '<p>WASM server ready!</p>' +
            '<p class="mt-2"><a href="./" class="button is-primary">Open Hello World</a></p>' +
            '</div>';
        })
        .catch(function(err) {
          statusDiv.innerHTML = '<div class="notification is-danger">' +
            'Failed to start: ' + err.message +
            '</div>';
        });
    }
  </script>
</body>
</html>
