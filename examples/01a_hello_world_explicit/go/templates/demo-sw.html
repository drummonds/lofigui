<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
</head>
<body>
  <p>Redirecting to <a href="./sw/">./sw/</a>...</p>
  <script>
    (async function() {
      if ('serviceWorker' in navigator) {
        var regs = await navigator.serviceWorker.getRegistrations();
        for (var r of regs) {
          if (location.href.indexOf(r.scope) === 0) {
            await r.unregister();
          }
        }
      }
      window.location.replace('./sw/');
    })();
  </script>
</body>
</html>
