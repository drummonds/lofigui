<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Hello World Explicit + gzip</title>
  <link rel="stylesheet" href="/assets/bulma.min.css">
</head>
<body>
  <section class="section">
    <div class="container">
      <h1 class="title">01b — Hello World Explicit + gzip</h1>
      <h2 class="subtitle">Service worker WASM loaded from a gzipped binary, decompressed in-browser</h2>
      <p id="buildstamp" class="has-text-grey is-size-7"></p>
      <div id="status">
        <progress class="progress is-primary" max="100">Loading...</progress>
        <p class="mt-3">Decompressing gzipped WASM binary...</p>
      </div>
    </div>
  </section>
  <script>
    var BUILD_DATE = '2026-04-18';
    var BUILD_VERSION = '01b sw/ ' + BUILD_DATE;
    var BOOT_ISO = new Date().toISOString();
    document.getElementById('buildstamp').textContent =
      'build ' + BUILD_DATE + ' — loaded ' + BOOT_ISO;
    function ts() { return new Date().toISOString().substr(11, 12); }
    console.log('[sw-boot] ' + ts() + ' ' + BUILD_VERSION + ' — loaded ' + BOOT_ISO);

    var statusDiv = document.getElementById('status');
    var statusP = statusDiv.querySelector('p');

    function waitForWasm() {
      var ac = new AbortController();
      var timer = setTimeout(function() { ac.abort(); }, 2000);
      fetch('./favicon.ico', {signal: ac.signal})
        .then(function(resp) {
          clearTimeout(timer);
          if (resp.ok) {
            window.location.replace('./');
          } else {
            setTimeout(waitForWasm, 500);
          }
        })
        .catch(function() {
          clearTimeout(timer);
          setTimeout(waitForWasm, 500);
        });
    }

    if (!('serviceWorker' in navigator)) {
      statusDiv.innerHTML = '<div class="notification is-danger">' +
        'Service workers are not supported in this browser.</div>';
    } else {
      navigator.serviceWorker.getRegistrations()
        .then(function(regs) {
          return Promise.all(regs.map(function(r) { return r.unregister(); }));
        })
        // 1. Fetch the gzipped WASM binary. Most static hosts serve this
        //    verbatim (not Content-Encoding: gzip) so the browser doesn't
        //    auto-decode it.
        .then(function() { return fetch('main.wasm.gz'); })
        // 2. Pipe through DecompressionStream to get raw WASM bytes.
        .then(function(resp) {
          var ds = new DecompressionStream('gzip');
          return new Response(resp.body.pipeThrough(ds)).blob();
        })
        // 3. Write the decompressed bytes into a named cache under the URL
        //    'main.wasm'. The SW library will read from this cache in step 5.
        .then(function(blob) {
          statusP.textContent = 'Caching decompressed WASM...';
          return caches.open('wasm-gz-01b').then(function(cache) {
            var wasmUrl = new URL('main.wasm', location.href).href;
            return cache.put(wasmUrl, new Response(blob, {
              headers: {'Content-Type': 'application/wasm'}
            }));
          });
        })
        // 4. Register the service worker (which reads from the cache).
        .then(function() {
          statusP.textContent = 'Registering service worker...';
          return navigator.serviceWorker.register('sw.js', {updateViaCache: 'none'});
        })
        .then(function() { return navigator.serviceWorker.ready; })
        // 5. Poll for a handled fetch (favicon is the cheapest probe). The
        //    SW library instantiates the WASM from the cache during the
        //    first request it handles.
        .then(function() {
          statusP.textContent = 'Compiling WASM binary...';
          waitForWasm();
        })
        .catch(function(err) {
          statusDiv.innerHTML = '<div class="notification is-danger">' +
            'Failed to start: ' + err.message + '</div>';
        });
    }
  </script>
</body>
</html>
