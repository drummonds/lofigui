  <text x="184.9" y="1281.7" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16">- Demonstrating template inheritance and features.</text>
  <text x="8" y="1281.7" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16" font-weight="700">Lofigui Demo Application</text>
  <text x="8" y="1315.7" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16">Built with</text>
  <text x="124.5" y="1315.7" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16">, FastAPI, and Bulma.</text>
  <a xlink:href="https://github.com/drummonds/lofigui">
