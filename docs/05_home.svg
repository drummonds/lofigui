  <text x="8" y="168.6" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16">More</text>
  <a xlink:href="http://localhost:8050/about">
    <text x="27.1" y="186.6" fill="rgb(0,0,238)" font-family="&quot;Times New Roman&quot;" font-size="16">About</text>
  </a>
  <a xlink:href="https://github.com/drummonds/lofigui">
    <text x="90.6" y="186.6" fill="rgb(0,0,238)" font-family="&quot;Times New Roman&quot;" font-size="16">GitHub</text>
  </a>
  <text x="8" y="293.2" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="32" font-weight="700">Welcome to Lofigui Demo</text>
  <text x="8" y="343.7" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="24" font-weight="700">A comprehensive demonstration of Lofigui features</text>
  <text x="8" y="383.4" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16">This demo application showcases the key features of</text>
  <text x="399" y="383.4" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16">, a lightweight Python/Go framework for building simple web GUIs with template</text>
  <text x="8" y="401.4" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16">inheritance and reactive updates.</text>
  <text x="349.2" y="383.4" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16" font-weight="700">Lofigui</text>
  <text x="8" y="435.4" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16">What is Lofigui?</text>
  <text x="8" y="469.4" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16">Lofigui provides a simple way to create web interfaces with:</text>
  <text x="48" y="503.4" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16">Template inheritance using Jinja2</text>
  <text x="48" y="521.4" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16">Automatic page refresh during long-running processes</text>
  <text x="48" y="539.4" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16">Controller pattern for managing application state</text>
  <text x="48" y="557.4" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16">Support for Python and Go backends</text>
  <text x="48" y="575.4" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16">WASM support for running in the browser</text>
  <text x="8" y="615.3" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="18.7" font-weight="700">Features Demonstrated</text>
  <text x="24" y="655.4" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16" font-weight="700">Template Inheritance</text>
  <text x="8" y="694.6" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16">All pages extend a common</text>
  <text x="261.1" y="694.6" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16">template, demonstrating Jinja2 template inheritance with custom blocks.</text>
  <text x="190.6" y="695" fill="rgb(0,0,0)" font-family="monospace" font-size="13">base.html</text>
  <text x="24" y="733.9" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16" font-weight="700">Data Tables</text>
  <text x="8" y="773.2" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16">Display tabular data with automatic formatting using lofigui's table helpers.</text>
  <text x="24" y="812.4" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16" font-weight="700">Charts &amp; Visualizations</text>
  <text x="8" y="851.7" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16">Render charts and visualizations using markdown and HTML output.</text>
  <text x="24" y="891" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16" font-weight="700">Process Management</text>
  <text x="8" y="930.2" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16">Run long-running processes with automatic page refresh and status updates.</text>
  <text x="8" y="970.1" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="18.7" font-weight="700">Quick Start</text>
  <text x="48" y="1007.7" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16">Navigate through the menu to explore different features</text>
  <text x="48" y="1025.7" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16">Visit</text>
  <text x="162.6" y="1025.7" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16">to see formatted data display</text>
  <text x="82.2" y="1025.7" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16" font-weight="700">Data Tables</text>
  <text x="48" y="1043.7" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16">Check out</text>
  <text x="164.4" y="1043.7" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16">for visualization examples</text>
  <text x="117.3" y="1043.7" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16" font-weight="700">Charts</text>
  <text x="48" y="1061.7" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16">Try</text>
  <text x="159.1" y="1061.7" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16">to see the controller pattern in action</text>
  <text x="74.5" y="1061.7" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16" font-weight="700">Run Process</text>
  <a xlink:href="http://localhost:8050/data">
