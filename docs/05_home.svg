  <text x="56" y="1163.7" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16">Ready</text>
  <text x="8" y="1163.7" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16" font-weight="700">Status:</text>
