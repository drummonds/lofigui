<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Hello World Explicit — Service Worker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
</head>
<body>
  <section class="section">
    <div class="container">
      <h1 class="title">Hello World Explicit (Service Worker)</h1>
      <h2 class="subtitle">Go net/http handlers running in WASM inside a service worker</h2>
      <p id="buildstamp" class="has-text-grey is-size-7"></p>
      <div id="status">
        <progress class="progress is-primary" max="100">Loading...</progress>
        <p class="mt-3">Registering service worker...</p>
      </div>
    </div>
  </section>
  <script>
    var BUILD_DATE = '2026-04-18';
    var BUILD_VERSION = '01a sw/ ' + BUILD_DATE;
    var BOOT_ISO = new Date().toISOString();
    document.getElementById('buildstamp').textContent =
      'build ' + BUILD_DATE + ' — loaded ' + BOOT_ISO;
    function ts() { return new Date().toISOString().substr(11, 12); }
    console.log('[sw-boot] ' + ts() + ' ' + BUILD_VERSION + ' — loaded ' + BOOT_ISO);

    var statusDiv = document.getElementById('status');
    var statusP = statusDiv.querySelector('p');

    function waitForWasm() {
      var ac = new AbortController();
      var timer = setTimeout(function() { ac.abort(); }, 2000);
      fetch('./favicon.ico', {signal: ac.signal})
        .then(function(resp) {
          clearTimeout(timer);
          if (resp.ok) {
            window.location.replace('./');
          } else {
            setTimeout(waitForWasm, 500);
          }
        })
        .catch(function() {
          clearTimeout(timer);
          setTimeout(waitForWasm, 500);
        });
    }

    if (!('serviceWorker' in navigator)) {
      statusDiv.innerHTML = '<div class="notification is-danger">' +
        'Service workers are not supported in this browser.' +
        '</div>';
    } else {
      navigator.serviceWorker.getRegistrations()
        .then(function(regs) {
          return Promise.all(regs.map(function(r) { return r.unregister(); }));
        })
        .then(function() {
          statusP.textContent = 'Loading WASM binary...';
          return navigator.serviceWorker.register('sw.js', {updateViaCache: 'none'});
        })
        .then(function() {
          return navigator.serviceWorker.ready;
        })
        .then(function() {
          statusP.textContent = 'Compiling WASM binary...';
          waitForWasm();
        })
        .catch(function(err) {
          statusDiv.innerHTML = '<div class="notification is-danger">' +
            'Failed to start: ' + err.message +
            '</div>';
        });
    }
  </script>
</body>
</html>
