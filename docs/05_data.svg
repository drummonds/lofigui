  <text x="8" y="676.2" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="18.7" font-weight="700">Framework Comparison</text>
  <text x="11" y="716.7" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16" font-weight="700">Framework</text>
