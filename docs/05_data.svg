  <text x="95.9" y="760.7" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16">Python</text>
  <text x="169.2" y="760.7" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16">Micro-framework</text>
  <text x="290" y="760.7" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16">Full web framework</text>
