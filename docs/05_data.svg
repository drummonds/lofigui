  <text x="224.3" y="570.5" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16">Docker, K8s</text>
  <text x="320.7" y="570.5" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16">4 years</text>
  <text x="11" y="592.5" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16">David Brown</text>
