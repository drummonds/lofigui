  <text x="95.9" y="782.7" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16">Python</text>
  <text x="169.2" y="782.7" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16">High performance</text>
  <text x="290" y="782.7" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16">API-first, async</text>
