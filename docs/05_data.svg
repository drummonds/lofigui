  <text x="290" y="804.7" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16">Minimal web framework</text>
  <text x="24" y="841.7" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16">How it works</text>
  <text x="8" y="875.7" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16">Tables are generated using lofigui's</text>
  <text x="292.5" y="875.7" fill="rgb(0,0,0)" font-family="&quot;Times New Roman&quot;" font-size="16">function with optional headers and styling:</text>
  <text x="237.7" y="876.1" fill="rgb(0,0,0)" font-family="monospace" font-size="13">table()</text>
  <text x="8" y="908.1" fill="rgb(0,0,0)" font-family="monospace" font-size="13">import lofigui as lf</text>
  <text x="8" y="938.1" fill="rgb(0,0,0)" font-family="monospace" font-size="13">data = [</text>
  <text x="8" y="953.1" fill="rgb(0,0,0)" font-family="monospace" font-size="13">[&quot;Alice&quot;, &quot;Developer&quot;, &quot;5 years&quot;],</text>
  <text x="8" y="968.1" fill="rgb(0,0,0)" font-family="monospace" font-size="13">[&quot;Bob&quot;, &quot;Designer&quot;, &quot;3 years&quot;],</text>
  <text x="8" y="983.1" fill="rgb(0,0,0)" font-family="monospace" font-size="13">]</text>
  <text x="8" y="998.1" fill="rgb(0,0,0)" font-family="monospace" font-size="13">lf.table(data, header=[&quot;Name&quot;, &quot;Role&quot;, &quot;Experience&quot;])</text>
